<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <title>Social Card Renderer | Cheonglim Saem</title>
  <style>
    :root { --ink:#fff8ea; --gold:#f0c982; --jade:#24665c; --deep:#092a26; }
    * { box-sizing:border-box; }
    html, body { width:1080px; height:1350px; margin:0; overflow:hidden; }
    body { font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#10100e; color:var(--ink); }
    .card { position:relative; width:1080px; height:1350px; display:grid; align-content:end; padding:86px 78px; overflow:hidden; background:#111; }
    .card::before { content:""; position:absolute; inset:0; background:var(--image) center / cover no-repeat; filter:saturate(.92) contrast(1.02); }
    .card::after { content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,12,10,.18), rgba(10,12,10,.36) 38%, rgba(10,12,10,.88)), linear-gradient(90deg, rgba(10,12,10,.72), rgba(10,12,10,.18) 62%); }
    .copy { position:relative; z-index:1; max-width:830px; }
    .brand { display:flex; align-items:center; gap:18px; margin-bottom:44px; }
    .mark { width:72px; height:72px; display:grid; place-items:center; border-radius:50%; background:var(--deep); color:#fff3d4; font-size:28px; font-weight:950; }
    .brand span { color:#f7ead8; font-size:28px; font-weight:900; line-height:1.1; }
    .kicker { margin:0 0 18px; color:var(--gold); font-size:28px; font-weight:950; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin:0; max-width:840px; font-size:86px; line-height:.98; letter-spacing:0; text-wrap:balance; }
    p { margin:28px 0 0; max-width:760px; color:#f3e7d4; font-size:38px; font-weight:760; line-height:1.18; }
    .cta { display:inline-flex; min-height:82px; align-items:center; justify-content:center; margin-top:46px; padding:0 34px; border-radius:16px; background:var(--gold); color:#1f1713; font-size:30px; font-weight:950; }
    .url { margin-top:26px; color:#e7dbc8; font-size:27px; font-weight:850; }
    .proof { display:flex; flex-wrap:wrap; gap:14px; margin-top:42px; }
    .proof span { min-height:54px; display:flex; align-items:center; padding:0 18px; border:1px solid rgba(255,255,255,.24); border-radius:999px; background:rgba(12,52,46,.62); color:#fff7e8; font-size:23px; font-weight:900; }
    .card[data-card="1"] { --image:url("assets/seoseonsaeng-writing.png"); }
    .card[data-card="2"] { --image:url("assets/seohyang-overhead.png"); }
    .card[data-card="3"] { --image:url("assets/seohyang-seated.png"); }
    .card[data-card="4"] { --image:url("assets/sample-premium-page.png"); }
    .card[data-card="5"] { --image:url("assets/seoseonsaeng-writing.png"); }
    .card[data-card="4"]::after { background:linear-gradient(180deg, rgba(10,12,10,.18), rgba(10,12,10,.5) 36%, rgba(10,12,10,.9)), linear-gradient(90deg, rgba(10,12,10,.82), rgba(10,12,10,.25) 68%); }
  </style>
</head>
<body>
  <main class="card" data-card="1" id="card">
    <div class="copy">
      <div class="brand"><div class="mark">CL</div><span>Cheonglim Saem<br>K-fortune</span></div>
      <p class="kicker" id="kicker">Korean Four Pillars</p>
      <h1 id="headline">Korean Four Pillars reading in English.</h1>
      <p id="body">A K-fortune PDF for self-reflection, Korean culture, and life-pattern reading.</p>
      <div class="proof" id="proof"><span>Free mini preview</span><span>English PDF</span><span>Sample before order</span></div>
      <div class="cta" id="cta">Try the free preview</div>
      <div class="url">cheonglimsaju.com</div>
    </div>
  </main>
  <script>
    const cards = {
      1: {
        kicker: 'Korean Four Pillars',
        headline: 'Korean Four Pillars reading in English.',
        body: 'A K-fortune PDF for self-reflection, Korean culture, and life-pattern reading.',
        proof: ['Free mini preview', 'English PDF', 'Sample before order'],
        cta: 'Try the free preview',
      },
      2: {
        kicker: 'Birth-time context',
        headline: 'Your city and timezone are part of the reading.',
        body: 'Birthplace, timezone, DST, and true solar time are checked before interpretation.',
        proof: ['Birth city', 'Timezone', 'DST', 'Solar time'],
        cta: 'See the time-context check',
      },
      3: {
        kicker: 'Free mini preview',
        headline: 'Try one Korean Saju clue first.',
        body: 'Enter birth basics in your browser, then order only if the angle feels useful.',
        proof: ['No upload in preview', 'One personal clue', 'Full PDF optional'],
        cta: 'Open the mini preview',
      },
      4: {
        kicker: 'Sample PDF ready',
        headline: 'Know the format before you pay.',
        body: 'Basic, Premium, and VIP sample PDFs are visible before checkout.',
        proof: ['Basic 9 USDT', 'Premium 19 USDT', 'VIP 39 USDT'],
        cta: 'Download the sample PDF',
      },
      5: {
        kicker: 'Recommended report',
        headline: 'Premium is the best place to start.',
        body: 'Full Korean Saju reading with overseas birth-time context, life areas, and timing flow.',
        proof: ['About 25 pages', 'Delivery within 24h', 'PDF by email'],
        cta: 'Start with Premium',
      },
    };
    const params = new URLSearchParams(window.location.search);
    const selected = cards[params.get('card')] || cards[1];
    const cardNumber = Object.entries(cards).find(([, value]) => value === selected)?.[0] || '1';
    document.getElementById('card').dataset.card = cardNumber;
    document.getElementById('kicker').textContent = selected.kicker;
    document.getElementById('headline').textContent = selected.headline;
    document.getElementById('body').textContent = selected.body;
    document.getElementById('cta').textContent = selected.cta;
    document.getElementById('proof').innerHTML = selected.proof.map((item) => `<span>${item}</span>`).join('');
  </script>
</body>
</html>
